<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --primary: #0f172a;
            --primary-hover: #334155;
            --accent: #3b82f6;
            --bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }
        body {
            width: 280px; /* Um pouco mais largo para acomodar o visual */
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            background-color: var(--bg);
            margin: 0;
            color: var(--text-main);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .header svg { width: 24px; height: 24px; color: var(--accent); }
        h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.4; }
        
        /* Estilo Premium para o Botão */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        button:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Animação de Loading */
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #error-msg { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="header">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        <h2>CleanRead</h2>
    </div>
    <p>Remova anúncios e extraia apenas o conteúdo essencial.</p>
    
    <button id="clean-btn">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Limpar Leitura</span>
    </button>
    
    <div id="error-msg">Falha ao processar a página.</div>

    <script src="popup.js"></script>
</body>
</html>
